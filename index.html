document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>You're Already Living in the Future<\u002Ftitle>\n<style>\n/* ============================================================\n   PALETTE, TYPE, TOKENS\n   ============================================================ */\n:root{\n  --bg:#0A0A0F;\n  --bg-center:#14141F;\n  --violet:#9D4EDD;\n  --violet-halo:#C77DFF;\n  --cyan:#00F5FF;\n  --cyan-halo:#4CC9F0;\n  --white:#F8F9FA;\n  --gray:#ADB5BD;\n  --green:#4ADE80;\n  --red:#FB7185;\n  --orange:#FF9D45;\n\n  --font-title:\"Space Grotesk\",\"Inter\",\"Helvetica Neue\",Arial,sans-serif;\n  --font-body:\"Inter\",\"Helvetica Neue\",\"Segoe UI\",Arial,sans-serif;\n  --font-mono:\"JetBrains Mono\",\"SF Mono\",ui-monospace,\"Cascadia Code\",Menlo,Consolas,monospace;\n}\n\n*{box-sizing:border-box;margin:0;padding:0;}\n\nhtml,body{\n  height:100%;\n  background:var(--bg);\n  color:var(--white);\n  font-family:var(--font-body);\n  overflow:hidden;\n  cursor:default;\n}\n\n/* ============================================================\n   AURORA BACKGROUND (slow, subtle, max opacity 0.15)\n   ============================================================ */\n.bg-base{\n  position:fixed;inset:0;\n  background:radial-gradient(circle at 50% 45%, var(--bg-center) 0%, var(--bg) 62%);\n  z-index:0;\n}\n/* breathing core glow — the heart of the aura */\n.core-glow{\n  position:fixed;left:50%;top:48%;z-index:1;\n  width:120vw;height:120vh;transform:translate(-50%,-50%);\n  pointer-events:none;\n  background:\n    radial-gradient(closest-side, rgba(157,78,221,.22), transparent 70%),\n    radial-gradient(closest-side, rgba(0,245,255,.12), transparent 75%);\n  mix-blend-mode:screen;\n  filter:blur(20px);\n  animation:breathe 11s ease-in-out infinite;\n}\n@keyframes breathe{\n  0%,100%{opacity:.7;transform:translate(-50%,-50%) scale(1);}\n  50%{opacity:1;transform:translate(-50%,-50%) scale(1.12);}\n}\n.aurora{\n  position:fixed;inset:-30%;\n  z-index:1;\n  pointer-events:none;\n  filter:blur(90px);\n  opacity:.34;\n  animation:hueDrift 40s ease-in-out infinite;\n}\n@keyframes hueDrift{\n  0%,100%{filter:blur(90px) hue-rotate(0deg);}\n  50%{filter:blur(96px) hue-rotate(26deg);}\n}\n.aurora span{\n  position:absolute;\n  border-radius:50%;\n  mix-blend-mode:screen;\n}\n.aurora .a1{\n  width:55vw;height:55vw;left:-5%;top:-10%;\n  background:radial-gradient(circle, var(--violet) 0%, transparent 70%);\n  animation:drift1 26s ease-in-out infinite;\n}\n.aurora .a2{\n  width:50vw;height:50vw;right:-8%;bottom:-12%;\n  background:radial-gradient(circle, var(--cyan) 0%, transparent 70%);\n  animation:drift2 32s ease-in-out infinite;\n}\n.aurora .a3{\n  width:40vw;height:40vw;left:30%;top:40%;\n  background:radial-gradient(circle, var(--violet-halo) 0%, transparent 70%);\n  animation:drift3 22s ease-in-out infinite;\n}\n.aurora .a4{\n  width:46vw;height:46vw;right:18%;top:6%;\n  background:radial-gradient(circle, var(--cyan-halo) 0%, transparent 70%);\n  animation:drift1 29s ease-in-out infinite reverse;\n}\n@keyframes drift1{\n  0%,100%{transform:translate(0,0) scale(1);}\n  50%{transform:translate(12%,8%) scale(1.15);}\n}\n@keyframes drift2{\n  0%,100%{transform:translate(0,0) scale(1.05);}\n  50%{transform:translate(-10%,-9%) scale(.9);}\n}\n@keyframes drift3{\n  0%,100%{transform:translate(0,0) scale(.9);opacity:.6;}\n  50%{transform:translate(-8%,6%) scale(1.2);opacity:1;}\n}\n.vignette{\n  position:fixed;inset:0;z-index:2;pointer-events:none;\n  background:radial-gradient(circle at 50% 50%, transparent 55%, rgba(0,0,0,.55) 100%);\n}\n/* film grain — soft, animated, keeps the dark feeling alive */\n.grain{\n  position:fixed;inset:-50%;z-index:3;pointer-events:none;opacity:.05;\n  background-image:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><\u002Ffilter><rect width='100%25' height='100%25' filter='url(%23n)'/><\u002Fsvg>\");\n  animation:grainShift 1.6s steps(3) infinite;\n}\n@keyframes grainShift{\n  0%{transform:translate(0,0);}\n  33%{transform:translate(-3%,2%);}\n  66%{transform:translate(2%,-3%);}\n  100%{transform:translate(0,0);}\n}\n\n/* ============================================================\n   STAGE + SCALING ENGINE (fixed 1920x1080 canvas, letterboxed)\n   ============================================================ */\n.stage{\n  position:fixed;inset:0;z-index:5;\n  display:flex;align-items:center;justify-content:center;\n}\n.deck{\n  position:relative;\n  width:1920px;height:1080px;\n  transform-origin:center center;\n}\n.slide{\n  position:absolute;inset:0;\n  display:none;\n  padding:120px 150px;\n  align-items:center;\n  flex-direction:column;\n  justify-content:center;\n}\n.slide.active{display:flex;}\n.slide-inner{width:100%;max-width:1620px;}\n\n/* fade up on entry */\n@keyframes fadeUp{\n  from{opacity:0;transform:translateY(28px);}\n  to{opacity:1;transform:translateY(0);}\n}\n/* resting state is fully visible, fade only plays during the transient anim-in window */\n.slide-inner,.stagger>*{opacity:1;}\n.slide.active.anim-in .slide-inner{animation:fadeUp .6s cubic-bezier(.2,.7,.2,1) both;}\n.slide.active.anim-in .stagger>*{animation:fadeUp .6s cubic-bezier(.2,.7,.2,1) both;}\n.slide.active.anim-in .stagger>*:nth-child(2){animation-delay:.12s;}\n.slide.active.anim-in .stagger>*:nth-child(3){animation-delay:.24s;}\n.slide.active.anim-in .stagger>*:nth-child(4){animation-delay:.36s;}\n.slide.active.anim-in .stagger>*:nth-child(5){animation-delay:.48s;}\n\n/* ============================================================\n   TYPOGRAPHY\n   ============================================================ */\n.hero-title{\n  font-family:var(--font-title);\n  font-weight:800;\n  font-size:124px;\n  line-height:.96;\n  letter-spacing:-3px;\n  text-transform:uppercase;\n}\n.slide-title{\n  font-family:var(--font-title);\n  font-weight:800;\n  font-size:84px;\n  line-height:1;\n  letter-spacing:-1.5px;\n  text-transform:uppercase;\n}\n.subtitle{\n  font-family:var(--font-body);\n  font-weight:500;\n  font-size:42px;\n  color:var(--cyan);\n  letter-spacing:.5px;\n}\n.subtitle .soft{color:var(--cyan-halo);}\n.lead{font-size:46px;line-height:1.35;font-weight:400;color:var(--white);}\n.muted{color:var(--gray);}\n.kicker{\n  font-family:var(--font-mono);\n  font-size:24px;letter-spacing:6px;text-transform:uppercase;\n  color:var(--violet-halo);\n}\n.stmt{\n  font-family:var(--font-title);\n  font-weight:700;\n  font-size:72px;\n  line-height:1.12;\n  letter-spacing:-1px;\n  text-align:center;\n  text-wrap:balance;\n}\n.huge{\n  font-family:var(--font-title);\n  font-weight:800;\n  font-size:108px;\n  line-height:1.04;\n  letter-spacing:-2px;\n  text-align:center;\n  text-wrap:balance;\n}\n\n/* glows */\n.glow-v{\n  color:var(--white);\n  text-shadow:0 0 18px rgba(157,78,221,.55),0 0 48px rgba(199,125,255,.4),0 0 96px rgba(157,78,221,.28);\n}\n.glow-c{\n  color:var(--white);\n  text-shadow:0 0 18px rgba(0,245,255,.5),0 0 48px rgba(76,201,240,.38),0 0 96px rgba(0,245,255,.25);\n}\n.tint-v{color:var(--violet-halo);}\n.tint-c{color:var(--cyan-halo);}\n.glow-o{\n  color:#FFB870;\n  text-shadow:0 0 18px rgba(255,157,69,.6),0 0 48px rgba(255,157,69,.4),0 0 96px rgba(255,157,69,.28);\n}\n\n/* ============================================================\n   LAYOUT HELPERS\n   ============================================================ */\n.center{text-align:center;}\n.stack-lg>*+*{margin-top:40px;}\n.stack-md>*+*{margin-top:26px;}\n.stack-sm>*+*{margin-top:16px;}\n\n/* bulleted task lists, cyan markers, NO dash bullets */\n.task-list{list-style:none;display:flex;flex-direction:column;gap:30px;font-size:38px;line-height:1.3;}\n.task-list li{display:flex;align-items:flex-start;gap:26px;}\n.task-list li::before{\n  content:\"\";flex:0 0 auto;margin-top:18px;\n  width:16px;height:16px;border-radius:50%;\n  background:var(--cyan);\n  box-shadow:0 0 14px var(--cyan),0 0 28px var(--cyan-halo);\n}\n.num-list{list-style:none;display:flex;flex-direction:column;gap:30px;font-size:40px;line-height:1.3;}\n.num-list li{display:flex;align-items:baseline;gap:30px;}\n.num-list li .n{\n  font-family:var(--font-mono);font-size:34px;color:var(--violet-halo);\n  flex:0 0 auto;text-shadow:0 0 18px rgba(157,78,221,.6);\n}\n\n/* ============================================================\n   SPOT THE AI layout\n   ============================================================ */\n.spot{display:grid;grid-template-columns:1fr 720px;gap:90px;align-items:center;width:100%;}\n.spot .situation{font-family:var(--font-title);font-weight:700;font-size:60px;line-height:1.12;letter-spacing:-1px;}\n.spot .idx{font-family:var(--font-mono);font-size:26px;letter-spacing:4px;color:var(--gray);margin-bottom:34px;}\n.spot-q{margin-top:50px;font-family:var(--font-title);font-weight:800;font-size:80px;letter-spacing:-1px;}\n.spot-q .or{color:var(--gray);font-weight:500;}\n.spot-q .yes{\n  color:var(--green);\n  text-shadow:0 0 18px rgba(74,222,128,.6),0 0 48px rgba(74,222,128,.42),0 0 96px rgba(74,222,128,.28);\n  animation:pulseYes 2.6s ease-in-out infinite;\n}\n.spot-q .no{\n  color:var(--red);\n  text-shadow:0 0 18px rgba(251,113,133,.6),0 0 48px rgba(251,113,133,.42),0 0 96px rgba(251,113,133,.28);\n  animation:pulseNo 2.6s ease-in-out infinite;\n}\n@keyframes pulseYes{\n  0%,100%{text-shadow:0 0 18px rgba(74,222,128,.5),0 0 44px rgba(74,222,128,.34),0 0 88px rgba(74,222,128,.22);}\n  50%{text-shadow:0 0 24px rgba(74,222,128,.75),0 0 60px rgba(74,222,128,.5),0 0 120px rgba(74,222,128,.34);}\n}\n@keyframes pulseNo{\n  0%,100%{text-shadow:0 0 18px rgba(251,113,133,.5),0 0 44px rgba(251,113,133,.34),0 0 88px rgba(251,113,133,.22);}\n  50%{text-shadow:0 0 24px rgba(251,113,133,.75),0 0 60px rgba(251,113,133,.5),0 0 120px rgba(251,113,133,.34);}\n}\n\n/* image placeholders */\n.ph{\n  position:relative;\n  border-radius:18px;\n  background:linear-gradient(160deg,rgba(255,255,255,.04),rgba(255,255,255,.01));\n  border:1px solid rgba(173,181,189,.25);\n  display:flex;flex-direction:column;align-items:center;justify-content:center;\n  text-align:center;padding:40px;gap:18px;overflow:hidden;\n  aspect-ratio:4/3;\n}\n.ph .ph-tag{font-family:var(--font-mono);font-size:20px;letter-spacing:3px;color:var(--gray);text-transform:uppercase;}\n.ph .ph-desc{font-size:26px;color:var(--white);opacity:.85;line-height:1.3;max-width:80%;}\n.ph svg{position:absolute;inset:0;width:100%;height:100%;opacity:.10;}\n.ph.archive{\n  border-color:rgba(157,78,221,.55);\n  box-shadow:0 0 50px rgba(157,78,221,.3),inset 0 0 60px rgba(157,78,221,.12);\n  filter:grayscale(1) contrast(1.05);\n}\n.ph.archive .ph-tag{color:var(--violet-halo);}\n\n/* drag-and-drop image slot — same footprint as .ph */\n.ph-slot{\n  position:relative;width:100%;aspect-ratio:4/3;border-radius:18px;overflow:hidden;\n  box-shadow:0 0 40px rgba(0,0,0,.4);\n}\n/* during reframe, let the translucent spill show beyond the mask */\n.ph-slot:has(image-slot[data-reframe]){overflow:visible;z-index:20;box-shadow:none;}\n.ph-slot image-slot{width:100%;height:100%;display:block;color:rgba(225,220,245,.65);}\n/* empty slots: make the drop zone obvious on the dark deck */\n.ph-slot:has(image-slot:not([data-filled])){\n  outline:2px dashed rgba(0,245,255,.4);outline-offset:-8px;\n}\n.ph-slot image-slot::part(empty){color:var(--cyan-halo);}\n.ph-slot.archive{\n  box-shadow:0 0 50px rgba(157,78,221,.3),inset 0 0 60px rgba(157,78,221,.12);\n  outline:1px solid rgba(157,78,221,.45);outline-offset:-1px;\n}\n/* \"double-click to reposition\" affordance — only on a filled slot, on hover */\n.reframe-hint{\n  position:absolute;left:50%;bottom:14px;transform:translateX(-50%);z-index:5;\n  font-family:var(--font-mono);font-size:14px;letter-spacing:1px;color:var(--white);\n  white-space:nowrap;padding:6px 15px;border-radius:30px;\n  background:rgba(8,8,16,.8);border:1px solid rgba(0,245,255,.45);\n  box-shadow:0 0 22px rgba(0,245,255,.25);\n  -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);\n  opacity:0;transition:opacity .25s ease;pointer-events:none;\n}\n.ph-slot:has(image-slot[data-filled]):hover .reframe-hint{opacity:.96;}\n.ph-slot:has(image-slot[data-reframe]) .reframe-hint{opacity:0;}\n.reframe-hint.top{bottom:auto;top:14px;}\n\n/* number caption at the bottom of a timeline picture (ChatGPT 2022) */\n.ph-slot .stat-overlay{\n  position:absolute;left:0;right:0;bottom:0;z-index:4;\n  padding:54px 24px 24px;text-align:center;pointer-events:none;\n  background:linear-gradient(to top,rgba(5,5,12,.94) 8%,rgba(5,5,12,.7) 48%,transparent 100%);\n}\n.ph-slot .stat-overlay .stat{\n  font-family:var(--font-title);font-weight:800;font-size:58px;letter-spacing:-2px;line-height:1;\n}\n.ph-slot .stat-overlay .stat-cap{font-size:24px;color:var(--gray);margin-top:8px;}\n\n/* ============================================================\n   CARDS\n   ============================================================ */\n.grid-2x2{display:grid;grid-template-columns:1fr 1fr;gap:38px;}\n.row-cards{display:grid;gap:30px;}\n.card{\n  position:relative;\n  border-radius:22px;\n  padding:46px 44px;\n  background:linear-gradient(160deg,rgba(157,78,221,.10),rgba(255,255,255,.02));\n  border:1px solid rgba(157,78,221,.28);\n  box-shadow:0 0 44px rgba(157,78,221,.16),inset 0 1px 0 rgba(255,255,255,.05);\n}\n.card.cyan{\n  background:linear-gradient(160deg,rgba(0,245,255,.10),rgba(255,255,255,.02));\n  border-color:rgba(0,245,255,.30);\n  box-shadow:0 0 44px rgba(0,245,255,.16),inset 0 1px 0 rgba(255,255,255,.05);\n}\n.card .badge{\n  font-family:var(--font-title);font-weight:800;font-size:56px;\n  width:92px;height:92px;border-radius:16px;\n  display:flex;align-items:center;justify-content:center;\n  background:rgba(157,78,221,.14);color:var(--violet-halo);\n  box-shadow:0 0 30px rgba(157,78,221,.4);margin-bottom:26px;\n}\n.card.cyan .badge{background:rgba(0,245,255,.12);color:var(--cyan-halo);box-shadow:0 0 30px rgba(0,245,255,.4);}\n.card h3{font-family:var(--font-title);font-weight:700;font-size:42px;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}\n.card p{font-size:32px;color:var(--gray);line-height:1.3;}\n\n/* mission card (big, centered) */\n.mission{\n  border-radius:30px;\n  padding:80px 90px;\n  text-align:center;\n  background:linear-gradient(155deg,rgba(157,78,221,.16),rgba(255,255,255,.02));\n  border:1px solid rgba(157,78,221,.4);\n  box-shadow:0 0 90px rgba(157,78,221,.3),inset 0 0 80px rgba(157,78,221,.08);\n}\n.mission.cyan{\n  background:linear-gradient(155deg,rgba(0,245,255,.16),rgba(255,255,255,.02));\n  border-color:rgba(0,245,255,.4);\n  box-shadow:0 0 90px rgba(0,245,255,.3),inset 0 0 80px rgba(0,245,255,.08);\n}\n.mission.hybrid{\n  background:linear-gradient(120deg,rgba(157,78,221,.18),rgba(0,245,255,.16));\n  border-color:rgba(199,125,255,.5);\n  box-shadow:0 0 90px rgba(157,78,221,.28),0 0 90px rgba(0,245,255,.2);\n}\n.mission .label{font-family:var(--font-mono);font-size:30px;letter-spacing:5px;text-transform:uppercase;color:var(--violet-halo);margin-bottom:36px;}\n.mission.cyan .label{color:var(--cyan-halo);}\n.mission .body{font-family:var(--font-title);font-weight:600;font-size:54px;line-height:1.22;letter-spacing:-1px;}\n\n/* prompt compare (split) */\n.split{display:grid;grid-template-columns:1fr 1fr;gap:60px;width:100%;}\n.pcol{border-radius:22px;padding:50px;display:flex;flex-direction:column;gap:28px;min-height:560px;}\n.pcol.bad{background:linear-gradient(160deg,rgba(251,113,133,.08),rgba(255,255,255,.01));border:1px solid rgba(251,113,133,.3);box-shadow:0 0 40px rgba(251,113,133,.12);}\n.pcol.good{background:linear-gradient(160deg,rgba(157,78,221,.12),rgba(255,255,255,.02));border:1px solid rgba(157,78,221,.4);box-shadow:0 0 50px rgba(157,78,221,.22);}\n.pcol .ptag{font-family:var(--font-mono);font-size:24px;letter-spacing:4px;text-transform:uppercase;}\n.pcol.bad .ptag{color:var(--red);}\n.pcol.good .ptag{color:var(--violet-halo);}\n.prompt{font-family:var(--font-mono);font-size:30px;line-height:1.5;color:var(--white);}\n.prompt .key{color:var(--cyan-halo);}\n.result{margin-top:auto;padding-top:26px;border-top:1px solid rgba(255,255,255,.1);font-size:28px;line-height:1.4;}\n.pcol.bad .result{color:var(--gray);}\n.pcol.good .result{color:var(--white);}\n.result .rlabel{display:block;font-family:var(--font-mono);font-size:18px;letter-spacing:3px;text-transform:uppercase;color:var(--gray);margin-bottom:12px;}\n\n/* myth answer reveal */\n.answer{\n  font-family:var(--font-title);font-weight:800;font-size:96px;letter-spacing:2px;\n  text-align:center;margin-top:60px;\n}\n.answer.true{color:var(--green);text-shadow:0 0 26px rgba(74,222,128,.5),0 0 60px rgba(74,222,128,.3);}\n.answer.false{color:var(--red);text-shadow:0 0 26px rgba(251,113,133,.5),0 0 60px rgba(251,113,133,.3);}\n.answer.debate{color:var(--violet-halo);text-shadow:0 0 26px rgba(157,78,221,.5),0 0 60px rgba(199,125,255,.3);}\n\n/* timeline slide */\n.tl{display:grid;grid-template-columns:1fr 660px;gap:90px;align-items:center;width:100%;}\n.tl.solo{grid-template-columns:1fr;}\n.tl .year{\n  font-family:var(--font-title);font-weight:800;font-size:200px;line-height:.9;letter-spacing:-6px;\n  background:linear-gradient(100deg,var(--cyan) 0%,var(--violet-halo) 42%,var(--cyan-halo) 70%,var(--cyan) 100%);\n  background-size:240% 100%;\n  -webkit-background-clip:text;background-clip:text;\n  color:transparent;-webkit-text-fill-color:transparent;\n  text-shadow:none;\n  filter:drop-shadow(0 0 30px rgba(0,245,255,.4)) drop-shadow(0 0 70px rgba(157,78,221,.3));\n  animation:yearSheen 7s linear infinite;\n}\n@keyframes yearSheen{to{background-position:240% 0;}}\n.tl .year .placeholder-q{\n  -webkit-text-fill-color:var(--gray);color:var(--gray);\n  background:none;filter:none;opacity:.4;\n}\n.tl .ev{font-family:var(--font-title);font-weight:700;font-size:58px;line-height:1.1;letter-spacing:-1px;margin-top:24px;}\n.tl .note{font-size:34px;color:var(--gray);line-height:1.35;margin-top:30px;max-width:760px;}\n\n/* stat counter */\n.stat{font-family:var(--font-title);font-weight:800;font-size:120px;letter-spacing:-2px;}\n.stat-cap{font-size:34px;color:var(--gray);margin-top:14px;}\n\n/* myth instruction */\n.instr{font-size:38px;color:var(--gray);}\n.instr b.up{color:var(--green);}\n.instr b.down{color:var(--red);}\n\n/* fragments */\n.fragment{opacity:0;transform:translateY(14px);transition:opacity .5s ease,transform .5s ease;}\n.fragment.revealed{opacity:1;transform:none;}\n\n/* particles (title slides only) */\n.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}\n.particles i{\n  position:absolute;border-radius:50%;background:var(--violet-halo);\n  box-shadow:0 0 12px var(--violet-halo),0 0 24px var(--violet);\n  animation:floatp linear infinite;opacity:.0;\n}\n@keyframes floatp{\n  0%{opacity:0;transform:translateY(20px) scale(.6);}\n  20%{opacity:.9;}\n  80%{opacity:.9;}\n  100%{opacity:0;transform:translateY(-120px) scale(1);}\n}\n\n/* ============================================================\n   CHROME (progress, indicators, counter, hint)\n   ============================================================ */\n.progress{position:fixed;top:0;left:0;right:0;height:2px;z-index:30;background:rgba(255,255,255,.06);}\n.progress .bar{height:100%;width:0;background:linear-gradient(90deg,var(--violet),var(--cyan));box-shadow:0 0 12px var(--violet-halo),0 0 8px var(--cyan);transition:width .4s cubic-bezier(.2,.7,.2,1);}\n.session-indicator{position:fixed;top:34px;left:46px;z-index:30;font-family:var(--font-mono);font-size:22px;letter-spacing:4px;text-transform:uppercase;color:var(--gray);}\n.session-indicator b{color:var(--violet-halo);font-weight:500;}\n.counter{position:fixed;bottom:34px;right:46px;z-index:30;font-family:var(--font-mono);font-size:24px;letter-spacing:3px;color:var(--gray);}\n.counter b{color:var(--white);font-weight:500;}\n.hint{\n  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:30;\n  font-family:var(--font-mono);font-size:17px;letter-spacing:1.5px;color:var(--gray);\n  opacity:.0;transition:opacity .6s ease;text-align:center;white-space:nowrap;\n}\n.hint.show{opacity:.55;}\n\n/* ============================================================\n   MOSAIC\n   ============================================================ */\n.mosaic{\n  position:fixed;inset:0;z-index:40;display:none;\n  background:rgba(5,5,9,.96);\n  overflow-y:auto;padding:70px 60px;\n}\n.mosaic.open{display:block;}\n.mosaic h2{font-family:var(--font-title);font-weight:700;font-size:34px;letter-spacing:3px;text-transform:uppercase;color:var(--gray);margin-bottom:36px;text-align:center;}\n.mgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:22px;max-width:1700px;margin:0 auto;}\n.mcell{\n  position:relative;width:100%;aspect-ratio:16/9;border-radius:8px;overflow:hidden;\n  border:1px solid rgba(157,78,221,.25);cursor:pointer;background:var(--bg);\n  transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease;\n}\n.mcell:hover{transform:translateY(-4px);border-color:var(--violet-halo);box-shadow:0 0 24px rgba(157,78,221,.4);}\n.mcell.is-current{border-color:var(--cyan);box-shadow:0 0 24px rgba(0,245,255,.45);}\n.mcell .mthumb{position:absolute;top:0;left:0;width:1920px;height:1080px;transform:scale(.146);transform-origin:top left;pointer-events:none;}\n.mcell .mnum{position:absolute;bottom:6px;right:8px;font-family:var(--font-mono);font-size:13px;color:var(--white);z-index:2;background:rgba(0,0,0,.5);padding:1px 6px;border-radius:4px;}\n\n/* ============================================================\n   PICTURES PANEL — manage every image slot from one screen\n   ============================================================ */\n.pics{\n  position:fixed;inset:0;z-index:70;display:none;overflow-y:auto;\n  padding:70px 6vw 90px;\n  background:radial-gradient(circle at 50% 30%,rgba(16,12,30,.97),rgba(5,5,9,.99));\n  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);\n}\n.pics.open{display:block;}\n.pics-head{max-width:1500px;margin:0 auto 14px;text-align:center;}\n.pics-head h2{font-family:var(--font-title);font-weight:800;font-size:58px;letter-spacing:-1px;color:var(--white);}\n.pics-head .gv{color:var(--violet-halo);}\n.pics-head p{font-size:24px;color:var(--gray);margin-top:10px;line-height:1.4;}\n.pics-close{position:fixed;top:34px;right:40px;z-index:72;font-family:var(--font-mono);font-size:18px;letter-spacing:1px;color:var(--gray);cursor:pointer;border:1px solid rgba(173,181,189,.3);border-radius:30px;padding:8px 18px;background:rgba(0,0,0,.4);}\n.pics-close:hover{color:var(--white);border-color:var(--white);}\n.pics-sec{max-width:1500px;margin:0 auto;}\n.pics-sec h3{font-family:var(--font-mono);font-size:20px;letter-spacing:4px;text-transform:uppercase;color:var(--cyan);margin:48px 0 22px;text-shadow:0 0 14px rgba(0,245,255,.4);}\n.pics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:26px;}\n.pcard{\n  display:flex;flex-direction:column;gap:0;border-radius:16px;overflow:hidden;\n  background:linear-gradient(160deg,rgba(255,255,255,.05),rgba(255,255,255,.02));\n  border:1px solid rgba(173,181,189,.2);transition:border-color .2s ease,transform .2s ease,box-shadow .2s ease;\n}\n.pcard:hover{transform:translateY(-3px);border-color:var(--violet-halo);box-shadow:0 12px 36px rgba(157,78,221,.25);}\n.pthumb{\n  position:relative;width:100%;aspect-ratio:4/3;cursor:pointer;overflow:hidden;\n  background:rgba(0,0,0,.35) center/cover no-repeat;\n  display:flex;align-items:center;justify-content:center;\n  border-bottom:1px solid rgba(173,181,189,.14);\n}\n.pthumb.empty::before{\n  content:\"\";position:absolute;inset:14px;border:2px dashed rgba(157,78,221,.5);border-radius:10px;\n}\n.pthumb .pt-hint{position:relative;z-index:1;font-family:var(--font-mono);font-size:14px;letter-spacing:1px;color:var(--violet-halo);text-transform:uppercase;}\n.pthumb.filled .pt-hint{display:none;}\n.pthumb .pt-badge{\n  position:absolute;top:10px;left:10px;z-index:2;font-family:var(--font-mono);font-size:12px;color:#08080F;\n  background:var(--cyan);padding:2px 9px;border-radius:20px;opacity:0;transition:opacity .2s ease;\n}\n.pthumb.filled .pt-badge{opacity:1;}\n.pmeta{padding:16px 18px 18px;display:flex;flex-direction:column;gap:4px;flex:1;}\n.pmeta .pm-cap{font-size:19px;color:var(--white);line-height:1.3;flex:1;}\n.pmeta .pm-where{font-family:var(--font-mono);font-size:13px;letter-spacing:1px;color:var(--gray);text-transform:uppercase;}\n.pm-row{display:flex;gap:10px;margin-top:14px;}\n.pm-row button{\n  flex:1;padding:9px;border-radius:9px;font-family:var(--font-mono);font-size:13px;letter-spacing:.5px;\n  cursor:pointer;border:1px solid transparent;transition:all .18s ease;text-transform:uppercase;\n}\n.pm-choose{background:linear-gradient(120deg,var(--violet),var(--cyan));color:#08080F;font-weight:700;}\n.pm-choose:hover{box-shadow:0 0 20px rgba(0,245,255,.4);}\n.pm-go{background:rgba(255,255,255,.06);color:var(--white);border-color:rgba(173,181,189,.3);flex:0 0 70px;}\n.pm-go:hover{border-color:var(--cyan);color:var(--cyan);}\n.pm-clear{background:transparent;color:var(--gray);border-color:rgba(173,181,189,.25);flex:0 0 70px;}\n.pm-clear:hover{border-color:var(--red);color:var(--red);}\n\n/* ============================================================\n   LUMA, the AI host (persistent corner panel)\n   ============================================================ */\n.luma{\n  position:fixed;left:44px;bottom:34px;z-index:36;\n  display:flex;align-items:center;gap:14px;\n  padding:10px 22px 10px 10px;border-radius:70px;\n  background:linear-gradient(120deg,rgba(0,245,255,.10),rgba(12,12,22,.62));\n  border:1px solid rgba(0,245,255,.32);\n  box-shadow:0 0 42px rgba(0,245,255,.18),inset ;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:lcPulse 1s ease-in-out infinite;}\n.lc-state.think{color:var(--violet-halo);}\n.lc-state.think .lc-dot{background:var(--violet-halo);box-shadow:0 0 10px var(--violet-halo);}\n.lc-state.err{color:var(--red);}\n.lc-state.err .lc-dot{background:var(--red);box-shadow:none;animation:none;}\n@keyframes lcPulse{0%,100%{opacity:.4;transform:scale(.8);}50%{opacity:1;transform:scale(1.15);}}\n.lc-close{position:absolute;top:14px;right:18px;font-family:var(--font-mono);font-size:18px;color:var(--gray);cursor:pointer;line-height:1;}\n.lc-close:hover{color:var(--white);}\n\n/* ============================================================\n   PRINT (P key) grayscale fallback\n   ============================================================ */\n@media print{\n  @page{size:landscape;margin:0;}\n  html,body{overflow:visible;height:auto;background:#fff;}\n  .bg-base,.aurora,.vignette,.core-glow,.grain,.progress,.session-indicator,.counter,.hint,.mosaic,.luma{display:none!important;}\n  .stage{position:static;display:block;}\n  .deck{width:1920px;height:auto;transform:none!important;}\n  .slide{\n    position:relative!important;inset:auto;display:flex!important;\n    width:1920px;height:1080px;page-break-after:always;break-after:page;\n    filter:grayscale(1);background:#fff;color:#111;\n  }\n  .slide *{color:#111!important;text-shadow:none!important;}\n  .fragment{opacity:1!important;transform:none!important;}\n  .particles,.aurora{display:none!important;}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"bg-base\"><\u002Fdiv>\n<div class=\"core-glow\"><\u002Fdiv>\n<div class=\"aurora\"><span class=\"a1\"><\u002Fspan><span class=\"a2\"><\u002Fspan><span class=\"a3\"><\u002Fspan><span class=\"a4\"><\u002Fspan><\u002Fdiv>\n<div class=\"vignette\"><\u002Fdiv>\n<div class=\"grain\"><\u002Fdiv>\n\n<div class=\"progress\"><div class=\"bar\" id=\"bar\"><\u002Fdiv><\u002Fdiv>\n<div class=\"session-indic ><path d=\"M34 39c5 1 9 6 9 11\"/>',\n    ask:'<path d=\"M14 14h36v26H30l-12 10V40h-4z\"/><line x1=\"24\" y1=\"27\" x2=\"40\" y2=\"27\"/>'\n  };\n  return s+(p[name]||'')+'<\u002Fsvg>';\n}\n\n/* ============================================================\n   LUMA speech helpers\n   ============================================================ */\nfunction speechClean(t){\n  return String(t)\n    .replace(/&ldquo;|&rdquo;|&quot;/g,'')\n    .replace(/&rsquo;|&lsquo;/g,\"'\")\n    .replace(/&hellip;/g,'')\n    .replace(/&amp;/g,' and ')\n    .replace(/&nbsp;/g,' ')\n    .replace(/\\s+/g,' ')\n    .trim();\n}\nfunction mythSay(type){\n  if(type==='true') return 'Yes. That one is true.';\n  if(type==='false') return 'Hmm. That one is false.';\n  return 'Ah. This one, let us debate.';\n}\nfunction sayYear(y){\n  var m={'1950':'nineteen fifty','1956':'nineteen fifty six','1966':'nineteen sixty six',\n    '1980s':'the nineteen eighties','1997':'nineteen ninety seven','2011':'twenty eleven',\n    '2012':'twenty twelve','2016':'twenty sixteen','2022':'twenty twenty two'};\n  return m[y]||y;\n}\n\n/* ============================================================\n   SLIDE DATA, in order\n   each: {s:sessionNumber, start:true?, particles:true?, html:\"...\"}\n   ============================================================ */\nvar spot=[\n \"A TikTok feed showing exactly what you like\",\n \"Spotify Wrapped at the end of the year\",\n \"Google Translate\",\n \"An Instagram beauty filter\",\n \"The autocomplete on your phone\",\n \"A family photo from a hike (no filter)\",\n 'Netflix saying &ldquo;Because you watched...&rdquo;',\n \"Snapchat's My AI\"\n];\nvar spotImg=[\n \"A phone screen, an endless vertical video feed\",\n \"A bright year in review music summary screen\",\n \"A translation app, two languages side by side\",\n \"A selfie with a glossy face altering filter\",\n \"A keyboard suggesting the next word above the keys\",\n \"A warm honest family portrait, no editing\",\n \"A streaming home screen, a personal recommendation row\",\n \"A messaging app with a friendly chatbot avatar\"\n];\n\nvar myths=[\n [\"AI can feel emotions like humans.\",\"false\",\"FALSE\"],\n [\"AI learns from huge amounts of data.\",\"true\",\"TRUE\"],\n [\"AI is a brand new technology from 2022.\",\"false\",\"FALSE\"],\n [\"AI can make mistakes.\",\"true\",\"TRUE\"],\n [\"AI will replace all jobs in 10 years.\",\"debate\",\"LET'S DEBATE\"],\n [\"You already use AI every day.\",\"true\",\"TRUE\"]\n];\n\nvar timeline=[\n {year:\"1950\",ev:'Alan Turing asks &ldquo;Can machines think?&rdquo;',note:\"Before any computer was clever, one mathematician asked the biggest question.\",img:\"Black and white portrait of Alan Turing\",archive:true},\n {year:\"1956\",ev:\"The Dartmouth Conference\",note:'A summer workshop in the USA gave the field its name: Artificial Intelligence.',img:\"Vintage academic gathering, 1950s campus\",archive:true},\n {year:\"1966\",ev:\"ELIZA, the first chatbot\",note:\"It answered like a therapist. People felt understood by a few lines of code.\",img:\"Vintage green terminal screen, ELIZA conversation\",archive:true},\n {year:\"1980s\",ev:\"The AI Winter\",note:\"The money stopped. The hype froze. The dream waited in the cold.\",img:\"Stylised cold blue ice and frozen circuit\",archive:false,solo:false},\n {year:\"1997\",ev:\"Deep Blue beats Kasparov at chess\",note:\"A machine defeated the world champion. The whole planet paid attention.\",img:\"Archive photo, a chess match against a computer\",archive:true},\n {year:\"2011\",ev:\"Siri arrives in your pocket\",note:\"Suddenly AI lived in your phone, and it answered when you spoke.\",img:\"The original Siri microphone icon, glowing\",archive:false},\n {year:\"2012\",ev:\"Deep Learning explodes with ImageNet\",note:\"Machines learned to see. Millions of photos taught them how.\",img:\"A grid of labelled images, computer vision\",archive:false},\n {year:\"2016\",ev:\"AlphaGo beats the world Go champion\",note:\"Go was said to be too complex for machines. Until it was not.\",img:\"A Go board, black and white stones\",archive:false},\n {year:\"2022\",ev:\"ChatGPT, the public shift\",note:\"This is the moment AI walked into everyone's daily life.\",img:\"A steep adoption curve climbing fast\",archive:false,stat:true}\n];\n\nvar slides=[];\n\n/* SESSION 1 ------------------------------------------------ */\nslides.push({s:1,start:true,particles:true,html:\n '<div class=\"slide-inner center stagger stack-lg\">'\n +'<div class=\"kicker\">A 3 session journey into AI<\u002Fdiv>'\n +'<h1 class=\"hero-title glow-v\">You&rsquo;re already<br>living in the future.<\u002Fh1>'\n +'<div class=\"subtitle\">Session 1 of 3<span class=\"soft\">, Spot the AI.<\u002Fspan><\u002Fdiv>'\n +'<\u002Fdiv>'});\n\nslides.push({s:1,html:\n '<div class=\"slide-inner center stack-lg\">'\n +'<div class=\"huge glow-v\">6 hours. 3 sessions.<br>1 question.<\u002Fdiv>'\n +'<div class=\"lead tint-c\" style=\"font-size:56px;\">Are you ready for the AI world?<\u002Fdiv>'\n +'<div class=\"lead muted\">No tests. No grades. Just thinking, talking, building.<\u002Fdiv>'\n +'<\u002Fdiv>'});\n\nslides.push({s:1,html:\n '<div class=\"slide-inner center stack-md\">'\n +'<h2 class=\"slide-title glow-v\" style=\"font-size:128px;\">Spot the AI.<\u002Fh2>'\n +'<div class=\"subtitle\" style=\"font-size:48px;\">Is there AI here? YES or NO?<\u002Fdiv>'\n +'<\u002Fdiv>'});\n\nfor(var i=0;i<spot.length;i++){\n slides.push({s:1,voice:speechClean(spot[i])+'. Is this A.I.? Yes, or no?',html:\n  '<div class=\"slide-inner\"><div class=\"spot\">'\n  +'<div><div class=\"idx\">Situation '+(i+1)+' / 8<\u002Fdiv>'\n  +'<div class=\"situation\">'+spot[i]+'<\u002Fdiv>'\n  +'<div class=\"spot-q\">'\n   +'<span class=\"yes\">YES<\u002Fspan> <span class=\"or\">or<\u002Fspan> <span class=\"no\">NO?<\u002Fspan>'\n   +'<\u002Fdiv><\u002Fdiv>'\n  +'<div>'+placeholder(spotImg[i],false,'spot-'+i)+'<\u002Fdiv>'\n  +'<\u002Fdiv><\u0 aled');\n    animateReveal(f);\n    if(typeof Luma!=='undefined') Luma.onReveal(cur);\n    step++;\n  } else if(cur<total-1){\n    showSlide(cur+1,false);\n  }\n}\nfunction prev(){\n  if(step>0){\n    step--;\n    fragmentsOf(cur)[step].classList.remove('revealed');\n  } else if(cur>0){\n    showSlide(cur-1,true);\n  }\n}\n\nfunction updateChrome(){\n  document.getElementById('bar').style.width=((cur)/(total-1)*100)+'%';\n  var n=(cur+1);\n  document.getElementById('counter').innerHTML='<b>'+(n<10?'0'+n:n)+'<\u002Fb> / '+total;\n  document.getElementById('sessionInd').innerHTML='<b>Session '+slides[cur].s+'<\u002Fb>';\n}\n\n/* ============================================================\n   MOSAIC\n   ============================================================ */\nvar mosaic=document.getElementById('mosaic'), mgrid=document.getElementById('mgrid'), mosaicBuilt=false;\nfunction buildMosaic(){\n  mgrid.innerHTML='';\n  slideEls.forEach(function(sEl,idx){\n    var cell=document.createElement('div');\n    cell.className='mcell';\n    var clone=sEl.cloneNode(true);\n    clone.classList.add('active');\n    clone.style.display='flex';\n    clone.querySelectorAll('.fragment').forEach(function(f){\n      f.classList.add('revealed');\n      if(f.dataset.year) f.textContent=f.dataset.year;\n      if(f.dataset.count) f.textContent=parseInt(f.dataset.count,10).toLocaleString('en-US');\n    });\n    var thumb=document.createElement('div');\n    thumb.className='mthumb';\n    thumb.appendChild(clone);\n    cell.appendChild(thumb);\n    var num=document.createElement('div');num.className='mnum';num.textContent=(idx+1);\n    cell.appendChild(num);\n    cell.addEventListener('click',function(){ toggleMosaic(false); showSlide(idx,false); });\n    mgrid.appendChild(cell);\n  });\n  mosaicBuilt=true;\n}\nfunction toggleMosaic(force){\n  var open = (typeof force==='boolean') ? force : !mosaic.classList.contains('open');\n  if(open){\n    if(!mosaicBuilt) buildMosaic();\n    Array.protot idea in easy English; if one word is hard, add the French word once in brackets, e.g. \"a goal (un but)\".\\n'\n   +'- Encourage them to speak English. You may end with one very short, friendly question.\\n'\n   +'- Be kind and praise effort. Never judge mistakes.\\n'\n   +'- If the topic is A.I., explain it simply with one quick real-life example.\\n'\n   +'- Never use markdown, lists, headings, or emoji. Only plain spoken sentences a voice can read aloud.\\n\\n'\n   +'Example of the right length — Question: \"Why does A.I. not have emotions?\" Good answer: \"Because A.I. only finds patterns in data. It can write the word happy, but it does not feel happy inside.\"';\n  var elCache={};          // cleaned text -> object URL\n  var audio=new Audio();\n  audio.preload='auto';\n  function loadConfig(){\n    try{\n      EL.key=localStorage.getItem('el_api_key')||'';\n      EL.voice=localStorage.getItem('el_voice_id')||'';\n      EL.model=localStorage.getItem('el_model')||'eleven_multilingual_v2';\n      EL.lang=localStorage.getItem('el_lang')||'en-US';\n      EL.persona=localStorage.getItem('el_persona')||DEFAULT_PERSONA;\n      narrate=localStorage.getItem('luma_narrate')==='1';\n    }catch(e){}\n  }\n  function elActive(){ return !!(EL.key && EL.voice); }\n  /* the resting status line, depending on whether narration is on */\n  function idleStatus(){\n    if(!narrate) return 'silent · tap ‘ask’';\n    return elActive()?'online · ElevenLabs':'online';\n  }\n  function init(){\n    panel=document.getElementById('luma');\n    statusEl=document.getElementById('lumaStatus');\n    portrait=document.getElementById('lumaPortrait');\n    if(window.speechSynthesis){\n      loadVoices();\n      window.speechSynthesis.onvoiceschanged=loadVoices;\n    }\n    // click panel (not the set face control) replays the current line\n    panel.addEventListener('click',function(e){\n      if(e.target.closest('#lumaSetFace')||e.target.closest('#lumaFile')) return;\n      prime(); replay();\n    });\n    // portrait face: drag and drop, or the set face button\n    var fileInput=document.getElementById('lumaFile');\n    document.getElementById('lumaSetFace').addEventListener('click',function(e){e.stopPropagation();fileInput.click();});\n    fileInput.addEventListener('change',function(){ if(fileInput.files[0]) readFace(fileInput.files[0]); });\n    ['dragover','dragenter'].forEach(function(ev){ portrait.addEventListener(ev,function(e){e.preventDefault();e.stopPropagation();}); });\n    portrait.addEventListener('drop',function(e){\n      e.preventDefault();e.stopPropagation();\n      var f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];\n      if(f) readFace(f);\n    });\n    restoreFace();\n    loadConfig();\n    initVoicePanel();\n    initAsk();\n    var tgl=document.getElementById('lumaToggle');\n    if(tgl) tgl.addEventListener('click',function(e){ e.stopPropagation(); toggleNarrate(); });\n    panel.classList.toggle('narration-off',!narrate);\n    updateToggleUI();\n    updateVoiceBtn();\n    setStatus(idleStatus());\n  }\n  function updateToggleUI(){\n    var t=document.getElementById('lumaToggle');\n    if(!t) return;\n    t.classList.toggle('on',narrate);\n    t.setAttribute('aria-checked',narrate?'true':'false');\n    var lbl=t.querySelector('.lt-label');\n    if(lbl) lbl.textContent=narrate?'Voice on':'Voice off';\n  }\n  /* ---- ElevenLabs config popover ---- */\n  function updateVoiceBtn(){\n    var b=document.getElementById('lumaVoiceBtn');\n    if(b) b.classList.toggle('on', elActive());\n  }\n  function vpStatus(msg,kind){\n    var s=document.getElementById('vpStatus');\n    if(!s) return;\n    s.className='vp-status'+(kind?(' '+kind):'');\n    s.textContent=msg||'';\n  }\n  function initVoicePanel(){\n    var btn=document.getElementById('lumaVoiceBtn');\n    var pop=document.getElementById('voicePanel');\n    var keyIn=document.getElementById('elKey');\n    var voiceSel=document.getElementById('elVoice');\n    var modelSel=document.getElementById('elModel');\n    var langSel=document.getElementById('elLang');\n    var personaIn=document.getElementById('elPersona');\n    if(!btn||!pop) return;\n    keyIn.value=EL.key;\n    modelSel.value=EL.model;\n    if(langSel) langSel.value=EL.lang;\n    if(personaIn) personaIn.value=EL.persona||DEFAULT_PERSONA;\n    var reset=document.getElementById('elReset');\n    if(reset) reset.addEventListener('click',function(e){\n      e.stopPropagation();\n      if(personaIn) personaIn.value=DEFAULT_PERSONA;\n      vpStatus('Rules reset to default — press Save to apply.','ok');\n    });\n    btn.addEventListener('click',function(e){\n      e.stopPropagation();\n      var open=!pop.classList.contains('open');\n      pop.classList.toggle('open',open);\n      if(open && EL.key){ fetchVoices(EL.key, EL.voice); }\n    });\n    pop.addEventListener('click',function(e){ e.stopPropagation(); });\n    // re-fetch voices when a key is pasted/typed\n    var keyTimer=null;\n    keyIn.addEventListener('input',function(){\n      clearTimeout(keyTimer);\n      var v=keyIn.value.trim();\n      keyTimer=setTimeout(function(){ if(v.length>20) fetchVoices(v, voiceSel.value); },500);\n    });\n    document.getElementById('vpSave').addEventListener('click',function(){\n      EL.key=keyIn.value.trim();\n      EL.voice=voiceSel.value;\n      EL.model=modelSel.value;\n      if(langSel) EL.lang=langSel.value;\n      if(personaIn) EL.persona=personaIn.value.trim()||DEFAULT_PERSONA;\n      try{\n        localStorage.setItem('el_api_key',EL.key);\n        localStorage.setItem('el_voice_id',EL.voice);\n        localStorage.setItem('el_model',EL.model);\n        localStorage.setItem('el_lang',EL.lang);\n        localStorage.setItem('el_persona',EL.persona);\n      }catch(e){}\n      elCache={};\n      updateVoiceBtn();\n      setStatus(elActive()?'online · ElevenLabs':'online');\n      vpStatus(elActive()?'Saved. Luma now speaks with ElevenLabs.':'Saved. Using browser voice.','ok');\n      setTimeout(function(){ pop.classList.remove('open'); },1100);\n    });\n    document.getElementById('vpTest').addEventListener('click',function(){\n      var prevKey=EL.key, prevVoice=EL.voice, prevModel=EL.model;\n      EL.key=keyIn.value.trim(); EL.voice=voiceSel.value; EL.model=modelSel.value;\n      primed=true;\n      vpStatus('Synthesizing test…');\n      speakEleven('Hello. I am Luma, your A.I. host. Welcome to the future.').then(function(ok){\n        if(ok) vpStatus('Playing — that is your voice.','ok');\n        else { vpStatus('Could not reach ElevenLabs. Check the key and voice.','err');\n               EL.key=prevKey; EL.voice=prevVoice; EL.model=prevModel; }\n      });\n    });\n  }\n  function fetchVoices(key, keep){\n    var sel=document.getElementById('elVoice');\n    if(!sel) return;\n    vpStatus('Loading voices…');\n    fetch('https://api.elevenlabs.io/v1/voices',{headers:{'xi-api-key':key}})\n      .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })\n      .then(function(data){\n        var list=(data&&data.voices)||[];\n        if(!list.length){ vpStatus('No voices on this account.','err'); return; }\n        sel.innerHTML='';\n        list.forEach(function(v){\n          var o=document.createElement('option');\n          o.value=v.voice_id;\n          o.textContent=v.name+(v.labels&&v.labels.accent?(' · '+v.labels.accent):'');\n          sel.appendChild(o);\n        });\n        if(keep && list.some(function(v){return v.voice_id===keep;})) sel.value=keep;\n        vpStatus(list.length+' voices loaded. Pick one and Save.','ok');\n      })\n      .catch(function(err){\n        vpStatus('Key rejected ('+err.message+'). Double-check it.','err');\n      });\n  }\n  function loadVoices(){\n    voices=window.speechSynthesis.getVoices()||[];\n    var prefs=[/aria/i,/jenny/i,/ava/i,/samantha/i,/google uk english female/i,/google us english/i,/serena/i,/zira/i,/karen/i,/moira/i,/libby/i,/sonia/i,/female/i];\n    chosen=null;\n    for(var i=0;i<prefs.length && !chosen;i++){\n      chosen=voices.filter(function(v){return /en/i.test(v.lang);}).find(function(v){return prefs[i].test(v.name);});\n    }\n    if(!chosen) chosen=voices.find(function(v){return /^en/i.test(v.lang);})||voices[0]||null;\n  }\n  function setStatus(t){ if(statusEl) statusEl.innerHTML='<span class=\"dot\"><\u002Fspan>'+t; }\n  function clean(t){\n    return String(t)\n      .replace(/\\bA\\.?I\\.?\\b/g,'A.I.')\n      .replace(/\\bChatGPT\\b/g,'Chat G P T')\n      .replace(/\\bRTCF\\b/g,'R T C F')\n      .replace(/\\bBTS\\b/g,'B T S')\n      .replace(/\\bCEO\\b/g,'C E O')\n      .replace(/\\bAGORA\\b/gi,'Agora');\n  }\n  /* ============================================================\n     ASK LUMA — speech-in, language-model brain, voice-out\n     ============================================================ */\n  var recog=null, listening=false, thinking=false, convo=[];\n  var chatEl,qEl,qTextEl,aEl,aTextEl,stateEl,askBtn;\n  function initAsk(){\n    chatEl=document.getElementById('lumaChat');\n    qEl=document.getElementById('lcQ'); qTextEl=document.getElementById('lcQText');\n    aEl=document.getElementById('lcA'); aTextEl=document.getElementById('lcAText');\n    stateEl=document.getElementById('lcState');\n    askBtn=document.getElementById('lumaAskBtn');\n    if(askBtn) askBtn.addEventListener('click',function(e){ e.stopPropagation(); startListening(); });\n    var close=document.getElementById('lcClose');\n    if(close) close.addEventListener('click',function(e){ e.stopPropagation(); closeChat(); });\n    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;\n    if(SR){\n      recog=new SR();\n      recog.lang='en-US'; recog.interimResults=true; recog.maxAlternatives=1; recog.continuous=false;\n      recog.onresult=function(ev){\n        var txt='';\n        for(var i=0;i<ev.results.length;i++) txt+=ev.results[i][0].transcript;\n        qTextEl.textContent=txt;\n        if(ev.results[ev.results.length-1].isFinal){ handleQuestion(txt.trim()); }\n      };\n      recog.onerror=function(ev){\n        if(ev.error==='not-allowed'||ev.error==='service-not-allowed'){\n          setChatState('Microphone blocked — allow mic access and try again.','err');\n        } else if(ev.error==='no-speech'){\n          setChatState('I did not hear anything. Press A to try again.','err');\n        } else { setChatState('Listening error: '+ev.error,'err'); }\n        endListening();\n      };\n      recog.onend=function(){ if(listening) endListening(); };\n    }\n  }\n  function setChatState(msg,kind){\n    if(!stateEl) return;\n    stateEl.className='lc-state'+(kind?(' '+kind):'');\n    stateEl.innerHTML='<span class=\"lc-dot\"><\u002Fspan>'+msg;\n  }\n  function openChat(){ chatEl.classList.add('open'); }\n  function closeChat(){\n    chatEl.classList.remove('open');\n    if(listening) endListening();\n  }\n  function startListening(){\n    primed=true;\n    if(thinking) return;\n    if(!recog){\n      openChat(); qEl.style.display='none'; aEl.style.display='none';\n      setChatState('Voice input needs Chrome or Edge on desktop.','err');\n      return;\n    }\n    stopAll();\n    openChat();\n    qEl.style.display='block'; qTextEl.textContent='…';\n    aEl.style.display='none';\n    setChatState('Listening… speak your question');\n    listening=true;\n    panel.classList.add('listening'); if(askBtn) askBtn.classList.add('live');\n    setStatus('listening');\n    try{ recog.lang=EL.lang||'en-US'; }catch(e){}\n    try{ recog.start(); }catch(e){}\n  }\n  function endListening(){\n    listening=false;\n    panel.classList.remove('listening'); if(askBtn) askBtn.classList.remove('live');\n    try{ recog.stop(); }catch(e){}\n    if(!thinking) setStatus(idleStatus());\n  }\n  function handleQuestion(q){\n    endListening();\n    if(!q){ setChatState('I did not catch that. Press A to try again.','err'); return; }\n    askBrain(q);\n  }\n  function askBrain(q){\n    if(!(window.claude&&window.claude.complete)){\n      setChatState('Luma\\u2019s brain is only available in the live preview.','err');\n      return;\n    }\n    thinking=true;\n    panel.classList.add('thinking'); setStatus('thinking');\n    setChatState('Luma is thinking…','think');\n    var persona=EL.persona||DEFAULT_PERSONA;\n    var hist=convo.slice(-6).map(function(t){ return (t.role==='user'?'Student: ':'Luma: ')+t.text; }).join('\\n');\n    var prompt=persona+'\\n\\n'+(hist?('Conversation so far:\\n'+hist+'\\n\\n'):'')+'Student: '+q+'\\nLuma:';\n    window.claude.complete(prompt).then(function(ans){\n      ans=(ans||'').trim();\n      thinking=false; panel.classList.remove('thinking');\n      if(!ans){ setChatState('I could not think of an answer. Try rephrasing.','err'); setStatus('online'); return; }\n      convo.push({role:'user',text:q});\n      convo.push({role:'assistant',text:ans});\n      aEl.style.display='block'; aTextEl.textContent=ans;\n      setChatState('Speaking…','think');\n      speak(ans);\n      // clear the state line once she's done (approx, audio drives the panel)\n      setTimeout(function(){ if(!thinking) setChatState('Press A to ask again',''); }, 1200);\n    }).catch(function(){\n      thinking=false; panel.classList.remove('thinking');\n      setChatState('Connection problem — try again in a moment.','err');\n      setStatus(elActive()?'online · ElevenLabs':'online');\n    });\n  }\n\n  function stopAll(){\n    try{ audio.pause(); }catch(e){}\n    if(window.speechSynthesis) window.speechSynthesis.cancel();\n    panel.classList.remove('speaking');\n  }\n  function onAudioStart(){ panel.classList.add('speaking'); setStatus('speaking'); }\n  function onAudioEnd(){ panel.classList.remove('speaking'); setStatus(idleStatus()); }\n  audio.addEventListener('playing',onAudioStart);\n  audio.addEventListener('ended',onAudioEnd);\n  audio.addEventListener('pause',function(){ if(audio.currentTime>0 && !audio.ended) onAudioEnd(); });\n  /* ElevenLabs speak — resolves true if it handled playback */\n  function speakEleven(text){\n    return new Promise(function(resolve){\n      if(!elActive()){ resolve(false); return; }\n      var t=clean(text);\n      if(elCache[t]){ playUrl(elCache[t]); resolve(true); return; }\n      setStatus('synthesizing');\n      fetch('https://api.elevenlabs.io/v1/text-to-speech/'+EL.voice,{\n        method:'POST',\n        headers:{'xi-api-key':EL.key,'Content-Type':'application/json','Accept':'audio/mpeg'},\n        body:JSON.stringify({\n          text:t, model_id:EL.model,\n          voice_settings:{stability:0.45, similarity_boost:0.85, style:0.35, use_speaker_boost:true}\n        })\n      }).then(function(r){ if(!r.ok) throw new Error(r.status); return r.blob(); })\n        .then(function(blob){\n          var url=URL.createObjectURL(blob);\n          elCache[t]=url;\n          playUrl(url);\n          resolve(true);\n        })\n        .catch(function(err){ setStatus(elActive()?'online · ElevenLabs':'online'); resolve(false); });\n    });\n  }\n  function playUrl(url){\n    try{ if(window.speechSynthesis) window.speechSynthesis.cancel(); }catch(e){}\n    audio.src=url;\n    var p=audio.play();\n    if(p&&p.catch) p.catch(function(){});\n  }\n  function speak(text){\n    if(!text) return;\n    lastLine=text;\n    stopAll();\n    speakEleven(text).then(function(handled){ if(!handled) speakBrowser(text); });\n  }\n  function speakBrowser(text){\n    if(!text||!window.speechSynthesis) return;\n    window.speechSynthesis.cancel();\n    var u=new SpeechSynthesisUtterance(clean(text));\n    if(chosen) u.voice=chosen;\n    u.lang=(chosen&&chosen.lang)||'en-US';\n    u.rate=1.07; u.pitch=1.14; u.volume=1;\n    u.onstart=function(){ panel.classList.add('speaking'); setStatus('speaking'); };\n    u.onend=function(){ panel.classList.remove('speaking'); setStatus(idleStatus()); };\n    u.onerror=u.onend;\n    try{ window.speechSynthesis.speak(u); }catch(err){}\n  }\n  function replay(){ speak(lastLine || (slides[cur]&&slides[cur].voice) || 'Press the arrow keys to continue.'); }\n  function toggleNarrate(){ setNarrate(!narrate); }\n  function setNarrate(on){\n    narrate=on;\n    try{ localStorage.setItem('luma_narrate', on?'1':'0'); }catch(e){}\n    panel.classList.toggle('narration-off',!narrate);\n    updateToggleUI();\n    if(narrate){\n      primed=true;\n      // confirm it's on by reading the current slide aloud once\n      var v=(slides[cur]&&slides[cur].voice)||'';\n      if(v) speak(v); else setStatus(idleStatus());\n    } else {\n      stopAll();\n      setStatus(idleStatus());\n    }\n  }\n  function prime(){\n    // first user gesture unlocks the browser audio engine — but stay silent\n    if(primed) return; primed=true;\n  }\n  var slideTimer=null;\n  function onSlide(idx,atEnd){\n    stopAll();\n    lastLine = (slides[idx]&&slides[idx].voice) || '';\n    clearTimeout(slideTimer);\n    if(slides[idx]&&slides[idx].voice && narrate){\n      slideTimer=setTimeout(function(){ speak(slides[idx].voice); },680);\n    }\n  }\n  function onReveal(idx){\n    if(slides[idx]&&slides[idx].voiceReveal && narrate){\n      speak(slides[idx].voiceReveal);\n    }\n  }\n  function readFace(file){\n    var r=new FileReader();\n    r.onload=function(){\n      var old=portrait.querySelector('img'); if(old) old.remove();\n      var img=document.createElement('img'); img.src=r.result;\n      portrait.insertBefore(img,portrait.firstChild);\n      portrait.classList.add('has-img');\n      try{ localStorage.setItem('luma_face',r.result); }catch(e){}\n    };\n    r.readAsDataURL(file);\n  }\n  function restoreFace(){\n    var data=null; try{ data=localStorage.getItem('luma_face'); }catch(e){}\n    if(!data){ data=DEFAULT_FACE; }\n    if(data){\n      var img=document.createElement('img'); img.src=data;\n      portrait.insertBefore(img,portrait.firstChild);\n      portrait.classList.add('has-img');\n    }\n  }\n  return {init:init,speak:speak,replay:replay,toggleNarrate:toggleNarrate,setNarrate:setNarrate,prime:prime,onSlide:onSlide,onReveal:onReveal,ask:startListening};\n})();\n\n/* init */\nLuma.init();\nshowSlide(0,false);\n// prime the voice on the very first interaction (browsers require a user gesture)\n['keydown','click','touchstart'].forEach(function(ev){\n  window.addEventListener(ev,function once(){ Luma.prime(); window.removeEventListener(ev,once); },{once:true});\n});\n<\u002Fscript>\n<script src=\"e0f2de19-1350-4da0-ae72-aa3701586107\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
